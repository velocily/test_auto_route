<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="Microsoft YaHei, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#555">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#2E75B6">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#27AE60">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="900" height="720" fill="#F8F9FA"/>
  <text x="450" y="30" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">路由决策流程图</text>

  <!-- 主流程模块（垂直排列，居中 x=350） -->
  <!-- 1. 用户输入 -->
  <rect x="250" y="55" width="200" height="45" rx="8" fill="#34495E" filter="url(#shadow)"/>
  <text x="350" y="82" text-anchor="middle" fill="white" font-size="14" font-weight="bold">用户输入</text>

  <!-- 2. 嵌入向量化 -->
  <rect x="250" y="125" width="200" height="45" rx="8" fill="white" stroke="#2E75B6" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="152" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">嵌入向量化</text>

  <!-- 3. KNN检索 + 关键词先验 -->
  <rect x="250" y="195" width="200" height="45" rx="8" fill="white" stroke="#2E75B6" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="222" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">KNN检索 + 关键词先验</text>

  <!-- 4. 概率融合 -->
  <rect x="250" y="265" width="200" height="45" rx="8" fill="white" stroke="#2E75B6" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="292" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">概率融合</text>

  <!-- 5. Domain预测 -->
  <rect x="250" y="335" width="200" height="45" rx="8" fill="white" stroke="#2E75B6" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="362" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Domain 预测</text>

  <!-- 6. 难度评估 -->
  <rect x="250" y="405" width="200" height="45" rx="8" fill="white" stroke="#8E44AD" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="432" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">难度评估</text>

  <!-- 7. 效率归一化 -->
  <rect x="250" y="475" width="200" height="45" rx="8" fill="white" stroke="#E67E22" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="502" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">效率归一化</text>

  <!-- 8. 综合打分 -->
  <rect x="250" y="545" width="200" height="45" rx="8" fill="white" stroke="#2E75B6" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="572" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">综合打分</text>

  <!-- 9. 选出最佳模型 -->
  <rect x="250" y="615" width="200" height="45" rx="8" fill="#27AE60" filter="url(#shadow)"/>
  <text x="350" y="642" text-anchor="middle" fill="white" font-size="14" font-weight="bold">选出最佳模型 → 路由结果</text>

  <!-- 右侧分支模块 -->
  <!-- 自适应α（在难度评估右侧） -->
  <rect x="560" y="405" width="180" height="45" rx="8" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="432" text-anchor="middle" fill="#8E44AD" font-size="12" font-weight="bold">自适应 α 调整</text>

  <!-- 能力查询（在效率归一化右侧） -->
  <rect x="560" y="475" width="180" height="45" rx="8" fill="#FEF5E7" stroke="#E67E22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="502" text-anchor="middle" fill="#E67E22" font-size="12" font-weight="bold">能力查询（model_benchmarks）</text>

  <!-- 调参台（在综合打分右侧） -->
  <rect x="560" y="545" width="180" height="45" rx="8" fill="#E8F8F5" stroke="#16A085" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="572" text-anchor="middle" fill="#16A085" font-size="12" font-weight="bold">调参台（参数生效）</text>

  <!-- === 主流程垂直箭头（x=350，从上到下） === -->
  <line x1="350" y1="100" x2="350" y2="125" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="170" x2="350" y2="195" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="240" x2="350" y2="265" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="310" x2="350" y2="335" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="380" x2="350" y2="405" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="450" x2="350" y2="475" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="520" x2="350" y2="545" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="590" x2="350" y2="615" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- === 右侧分支水平箭头（从主流程到分支） === -->
  <!-- 难度评估 -> 自适应α -->
  <line x1="450" y1="427" x2="560" y2="427" stroke="#8E44AD" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <!-- 能力查询 -> 效率归一化 -->
  <line x1="560" y1="497" x2="450" y2="497" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- 调参台 -> 综合打分 -->
  <line x1="560" y1="567" x2="450" y2="567" stroke="#16A085" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 左侧说明文字 -->
  <text x="60" y="150" fill="#888" font-size="11">输入文本经</text>
  <text x="60" y="165" fill="#888" font-size="11">embedding模型</text>
  <text x="60" y="180" fill="#888" font-size="11">转为向量</text>

  <text x="60" y="220" fill="#888" font-size="11">KNN找历史相似</text>
  <text x="60" y="235" fill="#888" font-size="11">样本+关键词</text>
  <text x="60" y="250" fill="#888" font-size="11">匹配Domain</text>

  <text x="60" y="360" fill="#888" font-size="11">预测问题领域</text>
  <text x="60" y="375" fill="#888" font-size="11">(8类Domain)</text>

  <text x="60" y="430" fill="#888" font-size="11">根据置信度</text>
  <text x="60" y="445" fill="#888" font-size="11">自适应调整α</text>

  <text x="60" y="500" fill="#888" font-size="11">TPS/延迟归一化</text>
  <text x="60" y="515" fill="#888" font-size="11">+能力分数查询</text>

  <text x="60" y="570" fill="#888" font-size="11">α×能力 +</text>
  <text x="60" y="585" fill="#888" font-size="11">(1-α)×效率</text>

  <!-- 底部说明 -->
  <text x="450" y="695" text-anchor="middle" fill="#999" font-size="11">主流程从上到下垂直执行，分支模块在右侧水平连接</text>
</svg>
