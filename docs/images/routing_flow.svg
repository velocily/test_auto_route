<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Microsoft YaHei, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A90E2"/>
      <stop offset="100%" stop-color="#2E75B6"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#229954"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bgGrad)"/>

  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">智能路由决策流程</text>
  <text x="600" y="65" text-anchor="middle" font-size="13" fill="#7f8c8d">从用户输入到模型选择的完整链路</text>

  <!-- 1. 用户输入 -->
  <rect x="50" y="100" width="160" height="60" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="130" y="130" text-anchor="middle" fill="white" font-size="14" font-weight="bold">用户输入</text>
  <text x="130" y="148" text-anchor="middle" fill="white" font-size="11">Query 文本</text>

  <!-- 2. 嵌入向量化 -->
  <rect x="250" y="100" width="160" height="60" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="330" y="130" text-anchor="middle" fill="white" font-size="14" font-weight="bold">嵌入向量化</text>
  <text x="330" y="148" text-anchor="middle" fill="white" font-size="11">SentenceTransformer</text>

  <!-- 3. KNN 检索 -->
  <rect x="450" y="100" width="160" height="60" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="530" y="130" text-anchor="middle" fill="white" font-size="14" font-weight="bold">KNN 检索</text>
  <text x="530" y="148" text-anchor="middle" fill="white" font-size="11">k=20 近邻软投票</text>

  <!-- 4. 关键词先验 -->
  <rect x="650" y="100" width="160" height="60" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="730" y="130" text-anchor="middle" fill="white" font-size="14" font-weight="bold">关键词先验</text>
  <text x="730" y="148" text-anchor="middle" fill="white" font-size="11">规则匹配加分</text>

  <!-- 5. 概率融合 -->
  <rect x="850" y="100" width="160" height="60" rx="10" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="930" y="130" text-anchor="middle" fill="white" font-size="14" font-weight="bold">概率融合</text>
  <text x="930" y="148" text-anchor="middle" fill="white" font-size="11">α×KNN+(1-α)×先验</text>

  <!-- 6. Domain 预测 -->
  <rect x="1050" y="100" width="100" height="60" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="1100" y="130" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Domain</text>
  <text x="1100" y="148" text-anchor="middle" fill="white" font-size="11">+ 置信度</text>

  <!-- 箭头连接第一行 -->
  <line x1="210" y1="130" x2="250" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="130" x2="450" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="130" x2="650" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="810" y1="130" x2="850" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1010" y1="130" x2="1050" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 难度评估模块 -->
  <rect x="450" y="220" width="280" height="80" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="590" y="250" text-anchor="middle" fill="white" font-size="15" font-weight="bold">难度评估</text>
  <text x="590" y="272" text-anchor="middle" fill="white" font-size="11">base + (0.5-conf)×4</text>
  <text x="590" y="288" text-anchor="middle" fill="white" font-size="11">clamp(1, 10)</text>

  <!-- 从 Domain 到 难度评估 -->
  <path d="M 1100 160 Q 1100 200 800 220 L 730 240" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 自适应 α 计算 -->
  <rect x="780" y="220" width="280" height="80" rx="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="920" y="250" text-anchor="middle" fill="white" font-size="15" font-weight="bold">自适应 α 计算</text>
  <text x="920" y="272" text-anchor="middle" fill="white" font-size="11">α_domain + boost/reduce</text>
  <text x="920" y="288" text-anchor="middle" fill="white" font-size="11">clamp(α_min, α_max)</text>

  <!-- 难度评估 → 自适应 α -->
  <line x1="730" y1="260" x2="780" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 效率归一化 -->
  <rect x="80" y="350" width="280" height="100" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="220" y="380" text-anchor="middle" fill="white" font-size="15" font-weight="bold">效率归一化</text>
  <text x="220" y="405" text-anchor="middle" fill="white" font-size="11">tps_score = min(tps/tps_max, 1)</text>
  <text x="220" y="422" text-anchor="middle" fill="white" font-size="11">latency_score = 1 - lat/lat_max</text>
  <text x="220" y="439" text-anchor="middle" fill="white" font-size="11">concurrency_score = min(con/con_max, 1)</text>

  <!-- 能力查询 -->
  <rect x="420" y="350" width="280" height="100" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="560" y="380" text-anchor="middle" fill="white" font-size="15" font-weight="bold">能力查询</text>
  <text x="560" y="405" text-anchor="middle" fill="white" font-size="11">从 model_benchmarks.json</text>
  <text x="560" y="422" text-anchor="middle" fill="white" font-size="11">读取每个模型的</text>
  <text x="560" y="439" text-anchor="middle" fill="white" font-size="11">benchmark[domain] 分数</text>

  <!-- 综合打分 -->
  <rect x="780" y="350" width="280" height="100" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="920" y="380" text-anchor="middle" fill="white" font-size="15" font-weight="bold">综合打分</text>
  <text x="920" y="410" text-anchor="middle" fill="white" font-size="13" font-weight="bold">combined =</text>
  <text x="920" y="430" text-anchor="middle" fill="white" font-size="12">α × capability + (1-α) × efficiency</text>

  <!-- 自适应 α → 综合打分 -->
  <line x1="920" y1="300" x2="920" y2="350" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 效率 → 综合打分 -->
  <path d="M 360 400 L 780 400" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- 能力 → 综合打分 -->
  <line x1="700" y1="400" x2="780" y2="400" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 选出最佳模型 -->
  <rect x="450" y="510" width="300" height="70" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="600" y="540" text-anchor="middle" fill="white" font-size="15" font-weight="bold">选出最佳模型</text>
  <text x="600" y="560" text-anchor="middle" fill="white" font-size="11">argmax(combined_score)</text>

  <!-- 综合打分 → 选出最佳 -->
  <line x1="920" y1="450" x2="750" y2="510" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 输出结果 -->
  <rect x="820" y="510" width="240" height="70" rx="10" fill="#34495e" filter="url(#shadow)"/>
  <text x="940" y="540" text-anchor="middle" fill="white" font-size="15" font-weight="bold">路由结果</text>
  <text x="940" y="560" text-anchor="middle" fill="white" font-size="11">selected_model + score</text>

  <line x1="750" y1="545" x2="820" y2="545" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 参数调控台（侧边） -->
  <rect x="50" y="510" width="350" height="180" rx="10" fill="white" stroke="#2E75B6" stroke-width="2" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="225" y="535" text-anchor="middle" fill="#2E75B6" font-size="14" font-weight="bold">可视化调参台（运行时调控）</text>
  <text x="70" y="560" fill="#555" font-size="11">• 选型权重 α（8 项）</text>
  <text x="70" y="578" fill="#555" font-size="11">• 难度评估（10 项）</text>
  <text x="70" y="596" fill="#555" font-size="11">• 难度自适应（6 项）</text>
  <text x="70" y="614" fill="#555" font-size="11">• 效率归一化（7 项）</text>
  <text x="70" y="632" fill="#555" font-size="11">• KNN 路由（2 项）</text>
  <text x="70" y="650" fill="#555" font-size="11">• 关键词先验（1 项）</text>
  <text x="70" y="675" fill="#e67e22" font-size="11" font-weight="bold">共 35 项可调参数，3 套预设</text>

  <!-- 调参台 → 各模块（虚线表示影响） -->
  <path d="M 400 580 Q 450 480 590 300" stroke="#2E75B6" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.6"/>
  <path d="M 400 600 Q 300 500 220 450" stroke="#2E75B6" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.6"/>
  <path d="M 400 620 Q 600 500 920 450" stroke="#2E75B6" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.6"/>

  <text x="600" y="705" text-anchor="middle" fill="#95a5a6" font-size="11">虚线表示参数调控台对各模块的影响（运行时可调）</text>
</svg>
