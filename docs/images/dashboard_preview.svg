<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="Microsoft YaHei, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f9fa"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="650" fill="#f0f2f5"/>

  <!-- 顶部标题栏 -->
  <rect x="0" y="0" width="1000" height="60" fill="url(#headerGrad)"/>
  <text x="30" y="38" fill="white" font-size="20" font-weight="bold">智能路由参数调控台</text>
  <rect x="780" y="15" width="90" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="825" y="35" text-anchor="middle" fill="#667eea" font-size="12" font-weight="bold">查看文档</text>
  <rect x="880" y="15" width="90" height="30" rx="5" fill="white" opacity="0.9"/>
  <text x="925" y="35" text-anchor="middle" fill="#667eea" font-size="12" font-weight="bold">重置默认</text>

  <!-- 预设栏 -->
  <rect x="20" y="75" width="960" height="50" rx="8" fill="white" filter="url(#cardShadow)"/>
  <text x="40" y="105" fill="#555" font-size="13">当前预设：</text>
  <rect x="120" y="88" width="100" height="28" rx="14" fill="#27ae60"/>
  <text x="170" y="107" text-anchor="middle" fill="white" font-size="12" font-weight="bold">效率优先</text>
  <rect x="230" y="88" width="80" height="28" rx="14" fill="#95a5a6" opacity="0.3"/>
  <text x="270" y="107" text-anchor="middle" fill="#555" font-size="12">平衡</text>
  <rect x="320" y="88" width="100" height="28" rx="14" fill="#95a5a6" opacity="0.3"/>
  <text x="370" y="107" text-anchor="middle" fill="#555" font-size="12">能力优先</text>
  <text x="800" y="107" fill="#27ae60" font-size="11">● 已保存</text>

  <!-- 卡片1: 选型权重 -->
  <rect x="20" y="140" width="470" height="220" rx="10" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
  <rect x="20" y="140" width="470" height="40" rx="10" fill="#2E75B6"/>
  <rect x="20" y="170" width="470" height="10" fill="#2E75B6"/>
  <text x="40" y="166" fill="white" font-size="14" font-weight="bold">⚖ 选型权重</text>
  <text x="430" y="166" text-anchor="end" fill="white" font-size="11">8 项</text>

  <!-- 滑块1: mmlu -->
  <text x="40" y="200" fill="#333" font-size="12" font-weight="bold">mmlu</text>
  <text x="40" y="215" fill="#888" font-size="10">MMLU 知识广度：能力/效率权重</text>
  <text x="450" y="205" text-anchor="end" fill="#2E75B6" font-size="14" font-weight="bold">0.35</text>
  <text x="55" y="232" fill="#aaa" font-size="9">0.10</text>
  <rect x="85" y="228" width="320" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="85" y="228" width="80" height="6" rx="3" fill="#2E75B6"/>
  <circle cx="165" cy="231" r="9" fill="#2E75B6" stroke="white" stroke-width="2"/>
  <text x="415" y="232" fill="#aaa" font-size="9">0.95</text>

  <!-- 滑块2: gsm8k -->
  <text x="40" y="258" fill="#333" font-size="12" font-weight="bold">gsm8k</text>
  <text x="40" y="273" fill="#888" font-size="10">GSM8K 数学推理：能力/效率权重</text>
  <text x="450" y="263" text-anchor="end" fill="#2E75B6" font-size="14" font-weight="bold">0.70</text>
  <text x="55" y="290" fill="#aaa" font-size="9">0.10</text>
  <rect x="85" y="286" width="320" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="85" y="286" width="213" height="6" rx="3" fill="#2E75B6"/>
  <circle cx="298" cy="289" r="9" fill="#2E75B6" stroke="white" stroke-width="2"/>
  <text x="415" y="290" fill="#aaa" font-size="9">0.95</text>

  <!-- 滑块3: hellaswag -->
  <text x="40" y="316" fill="#333" font-size="12" font-weight="bold">hellaswag</text>
  <text x="40" y="331" fill="#888" font-size="10">HellaSwag 常识推理：能力/效率权重</text>
  <text x="450" y="321" text-anchor="end" fill="#2E75B6" font-size="14" font-weight="bold">0.20</text>
  <text x="55" y="348" fill="#aaa" font-size="9">0.10</text>
  <rect x="85" y="344" width="320" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="85" y="344" width="38" height="6" rx="3" fill="#2E75B6"/>
  <circle cx="123" cy="347" r="9" fill="#2E75B6" stroke="white" stroke-width="2"/>
  <text x="415" y="348" fill="#aaa" font-size="9">0.95</text>

  <!-- 卡片2: 难度评估 -->
  <rect x="510" y="140" width="470" height="220" rx="10" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
  <rect x="510" y="140" width="470" height="40" rx="10" fill="#8e44ad"/>
  <rect x="510" y="170" width="470" height="10" fill="#8e44ad"/>
  <text x="530" y="166" fill="white" font-size="14" font-weight="bold">📊 难度评估</text>
  <text x="920" y="166" text-anchor="end" fill="white" font-size="11">10 项</text>

  <!-- 滑块: difficulty.base.mmlu -->
  <text x="530" y="200" fill="#333" font-size="12" font-weight="bold">mmlu 基础难度</text>
  <text x="530" y="215" fill="#888" font-size="10">MMLU 基础难度</text>
  <text x="940" y="205" text-anchor="end" fill="#8e44ad" font-size="14" font-weight="bold">5</text>
  <text x="545" y="232" fill="#aaa" font-size="9">1</text>
  <rect x="560" y="228" width="320" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="560" y="228" width="142" height="6" rx="3" fill="#8e44ad"/>
  <circle cx="702" cy="231" r="9" fill="#8e44ad" stroke="white" stroke-width="2"/>
  <text x="890" y="232" fill="#aaa" font-size="9">10</text>

  <!-- 滑块: difficulty.base.bbh_math -->
  <text x="530" y="258" fill="#333" font-size="12" font-weight="bold">bbh_math 基础难度</text>
  <text x="530" y="273" fill="#888" font-size="10">BBH 数学推理基础难度</text>
  <text x="940" y="263" text-anchor="end" fill="#8e44ad" font-size="14" font-weight="bold">8</text>
  <text x="545" y="290" fill="#aaa" font-size="9">1</text>
  <rect x="560" y="286" width="320" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="560" y="286" width="227" height="6" rx="3" fill="#8e44ad"/>
  <circle cx="787" cy="289" r="9" fill="#8e44ad" stroke="white" stroke-width="2"/>
  <text x="890" y="290" fill="#aaa" font-size="9">10</text>

  <!-- 滑块: confidence_factor -->
  <text x="530" y="316" fill="#333" font-size="12" font-weight="bold">confidence_factor</text>
  <text x="530" y="331" fill="#888" font-size="10">置信度对难度的影响系数</text>
  <text x="940" y="321" text-anchor="end" fill="#8e44ad" font-size="14" font-weight="bold">4</text>
  <text x="545" y="348" fill="#aaa" font-size="9">1</text>
  <rect x="560" y="344" width="320" height="6" rx="3" fill="#e0e0e0"/>
  <rect x="560" y="344" width="106" height="6" rx="3" fill="#8e44ad"/>
  <circle cx="666" cy="347" r="9" fill="#8e44ad" stroke="white" stroke-width="2"/>
  <text x="890" y="348" fill="#aaa" font-size="9">10</text>

  <!-- 卡片3: 难度自适应 -->
  <rect x="20" y="375" width="310" height="180" rx="10" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
  <rect x="20" y="375" width="310" height="35" rx="10" fill="#9b59b6"/>
  <rect x="20" y="400" width="310" height="10" fill="#9b59b6"/>
  <text x="35" y="398" fill="white" font-size="13" font-weight="bold">📈 难度自适应</text>
  <text x="310" y="398" text-anchor="end" fill="white" font-size="10">6 项</text>

  <text x="35" y="425" fill="#333" font-size="11">boost_high</text>
  <text x="290" y="425" text-anchor="end" fill="#9b59b6" font-size="12" font-weight="bold">0.20</text>
  <rect x="35" y="432" width="240" height="4" rx="2" fill="#e0e0e0"/>
  <rect x="35" y="432" width="48" height="4" rx="2" fill="#9b59b6"/>

  <text x="35" y="455" fill="#333" font-size="11">reduce_low</text>
  <text x="290" y="455" text-anchor="end" fill="#9b59b6" font-size="12" font-weight="bold">0.30</text>
  <rect x="35" y="462" width="240" height="4" rx="2" fill="#e0e0e0"/>
  <rect x="35" y="462" width="72" height="4" rx="2" fill="#9b59b6"/>

  <text x="35" y="485" fill="#333" font-size="11">alpha_min</text>
  <text x="290" y="485" text-anchor="end" fill="#9b59b6" font-size="12" font-weight="bold">0.10</text>
  <rect x="35" y="492" width="240" height="4" rx="2" fill="#e0e0e0"/>
  <rect x="35" y="492" width="24" height="4" rx="2" fill="#9b59b6"/>

  <text x="35" y="515" fill="#333" font-size="11">alpha_max</text>
  <text x="290" y="515" text-anchor="end" fill="#9b59b6" font-size="12" font-weight="bold">0.95</text>
  <rect x="35" y="522" width="240" height="4" rx="2" fill="#e0e0e0"/>
  <rect x="35" y="522" width="228" height="4" rx="2" fill="#9b59b6"/>

  <!-- 卡片4: 效率归一化 -->
  <rect x="345" y="375" width="310" height="180" rx="10" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
  <rect x="345" y="375" width="310" height="35" rx="10" fill="#e67e22"/>
  <rect x="345" y="400" width="310" height="10" fill="#e67e22"/>
  <text x="360" y="398" fill="white" font-size="13" font-weight="bold">⚡ 效率归一化</text>
  <text x="635" y="398" text-anchor="end" fill="white" font-size="10">7 项</text>

  <text x="360" y="425" fill="#333" font-size="11">weight_tps</text>
  <text x="615" y="425" text-anchor="end" fill="#e67e22" font-size="12" font-weight="bold">0.40</text>
  <rect x="360" y="432" width="240" height="4" rx="2" fill="#e0e0e0"/>
  <rect x="360" y="432" width="96" height="4" rx="2" fill="#e67e22"/>

  <text x="360" y="455" fill="#333" font-size="11">weight_latency</text>
  <text x="615" y="455" text-anchor="end" fill="#e67e22" font-size="12" font-weight="bold">0.30</text>
  <rect x="360" y="462" width="240" height="4" rx="2" fill="#e0e0e0"/>
  <rect x="360" y="462" width="72" height="4" rx="2" fill="#e67e22"/>

  <text x="360" y="485" fill="#333" font-size="11">tps_max</text>
  <text x="615" y="485" text-anchor="end" fill="#e67e22" font-size="12" font-weight="bold">60</text>
  <rect x="360" y="492" width="240" height="4" rx="2" fill="#e0e0e0"/>
  <rect x="360" y="492" width="50" height="4" rx="2" fill="#e67e22"/>

  <text x="360" y="515" fill="#333" font-size="11">latency_max</text>
  <text x="615" y="515" text-anchor="end" fill="#e67e22" font-size="12" font-weight="bold">3.0</text>
  <rect x="360" y="522" width="240" height="4" rx="2" fill="#e0e0e0"/>
  <rect x="360" y="522" width="80" height="4" rx="2" fill="#e67e22"/>

  <!-- 卡片5: KNN + 关键词先验 -->
  <rect x="670" y="375" width="310" height="180" rx="10" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
  <rect x="670" y="375" width="310" height="35" rx="10" fill="#27ae60"/>
  <rect x="670" y="400" width="310" height="10" fill="#27ae60"/>
  <text x="685" y="398" fill="white" font-size="13" font-weight="bold">🎯 KNN 路由 / 🔑 关键词先验</text>
  <text x="960" y="398" text-anchor="end" fill="white" font-size="10">3 项</text>

  <text x="685" y="425" fill="#333" font-size="11">k (近邻数)</text>
  <text x="940" y="425" text-anchor="end" fill="#27ae60" font-size="12" font-weight="bold">20</text>
  <rect x="685" y="432" width="240" height="4" rx="2" fill="#e0e0e0"/>
  <rect x="685" y="432" width="96" height="4" rx="2" fill="#27ae60"/>

  <text x="685" y="455" fill="#333" font-size="11">sim_temp (温度)</text>
  <text x="940" y="455" text-anchor="end" fill="#27ae60" font-size="12" font-weight="bold">10.0</text>
  <rect x="685" y="462" width="240" height="4" rx="2" fill="#e0e0e0"/>
  <rect x="685" y="462" width="80" height="4" rx="2" fill="#27ae60"/>

  <text x="685" y="485" fill="#333" font-size="11">prior.alpha (混合系数)</text>
  <text x="940" y="485" text-anchor="end" fill="#16a085" font-size="12" font-weight="bold">0.5</text>
  <rect x="685" y="492" width="240" height="4" rx="2" fill="#e0e0e0"/>
  <rect x="685" y="492" width="120" height="4" rx="2" fill="#16a085"/>

  <!-- 底部按钮 -->
  <rect x="250" y="585" width="180" height="40" rx="20" fill="#95a5a6"/>
  <text x="340" y="610" text-anchor="middle" fill="white" font-size="13" font-weight="bold">放弃修改</text>
  <rect x="570" y="585" width="180" height="40" rx="20" fill="#27ae60"/>
  <text x="660" y="610" text-anchor="middle" fill="white" font-size="13" font-weight="bold">保存并应用</text>
</svg>
