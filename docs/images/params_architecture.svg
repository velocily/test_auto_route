<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Microsoft YaHei, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#555">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#27AE60">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#2E75B6">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#E67E22">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="900" height="520" fill="#F8F9FA"/>
  <text x="450" y="30" text-anchor="middle" fill="#333" font-size="18" font-weight="bold">参数管理架构图</text>

  <!-- === 第一行：whoengine <- routing_params <- app.py === -->

  <!-- whoengine.py（左） -->
  <rect x="30" y="80" width="200" height="90" rx="10" fill="white" stroke="#2E75B6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="80" width="200" height="30" rx="10" fill="#2E75B6"/>
  <rect x="30" y="100" width="200" height="10" fill="#2E75B6"/>
  <text x="130" y="100" text-anchor="middle" fill="white" font-size="13" font-weight="bold">whoengine.py</text>
  <text x="130" y="135" text-anchor="middle" fill="#333" font-size="11">KNN 分类引擎</text>
  <text x="130" y="155" text-anchor="middle" fill="#888" font-size="10">读取参数用于路由决策</text>

  <!-- routing_params.py（中） -->
  <rect x="350" y="80" width="200" height="90" rx="10" fill="#E8F4FD" stroke="#2E75B6" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="350" y="80" width="200" height="30" rx="10" fill="#2E75B6"/>
  <rect x="350" y="100" width="200" height="10" fill="#2E75B6"/>
  <text x="450" y="100" text-anchor="middle" fill="white" font-size="13" font-weight="bold">routing_params.py</text>
  <text x="450" y="135" text-anchor="middle" fill="#333" font-size="11">参数中心（内存单例）</text>
  <text x="450" y="155" text-anchor="middle" fill="#888" font-size="10">所有路由参数的统一管理</text>

  <!-- app.py（右） -->
  <rect x="670" y="80" width="200" height="90" rx="10" fill="white" stroke="#E67E22" stroke-width="2" filter="url(#shadow)"/>
  <rect x="670" y="80" width="200" height="30" rx="10" fill="#E67E22"/>
  <rect x="670" y="100" width="200" height="10" fill="#E67E22"/>
  <text x="770" y="100" text-anchor="middle" fill="white" font-size="13" font-weight="bold">app.py</text>
  <text x="770" y="135" text-anchor="middle" fill="#333" font-size="11">路由服务 + 调参API</text>
  <text x="770" y="155" text-anchor="middle" fill="#888" font-size="10">读写参数、提供HTTP接口</text>

  <!-- 水平箭头：routing_params -> whoengine（参数生效） -->
  <line x1="350" y1="125" x2="230" y2="125" stroke="#27AE60" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="290" y="118" text-anchor="middle" fill="#27AE60" font-size="11" font-weight="bold">参数生效</text>

  <!-- 水平箭头：app.py -> routing_params（读写参数） -->
  <line x1="670" y1="125" x2="550" y2="125" stroke="#E67E22" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <text x="610" y="118" text-anchor="middle" fill="#E67E22" font-size="11" font-weight="bold">读写参数</text>

  <!-- === 第二行：dashboard -> app.py（垂直） === -->

  <!-- dashboard.html -->
  <rect x="670" y="240" width="200" height="90" rx="10" fill="white" stroke="#16A085" stroke-width="2" filter="url(#shadow)"/>
  <rect x="670" y="240" width="200" height="30" rx="10" fill="#16A085"/>
  <rect x="670" y="260" width="200" height="10" fill="#16A085"/>
  <text x="770" y="260" text-anchor="middle" fill="white" font-size="13" font-weight="bold">dashboard.html</text>
  <text x="770" y="295" text-anchor="middle" fill="#333" font-size="11">可视化调参台界面</text>
  <text x="770" y="315" text-anchor="middle" fill="#888" font-size="10">滑块调整 + 预设切换</text>

  <!-- 垂直箭头：dashboard -> app.py（HTTP请求） -->
  <line x1="770" y1="240" x2="770" y2="170" stroke="#16A085" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="785" y="208" fill="#16A085" font-size="11" font-weight="bold">HTTP 请求</text>

  <!-- === 第三行：实验人员 -> dashboard（垂直） === -->

  <!-- 实验人员 -->
  <rect x="670" y="400" width="200" height="90" rx="10" fill="white" stroke="#8E44AD" stroke-width="2" filter="url(#shadow)"/>
  <rect x="670" y="400" width="200" height="30" rx="10" fill="#8E44AD"/>
  <rect x="670" y="420" width="200" height="10" fill="#8E44AD"/>
  <text x="770" y="420" text-anchor="middle" fill="white" font-size="13" font-weight="bold">实验人员</text>
  <text x="770" y="455" text-anchor="middle" fill="#333" font-size="11">浏览器操作</text>
  <text x="770" y="475" text-anchor="middle" fill="#888" font-size="10">调整参数、保存配置</text>

  <!-- 垂直箭头：实验人员 -> dashboard（浏览器操作） -->
  <line x1="770" y1="400" x2="770" y2="330" stroke="#8E44AD" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="785" y="368" fill="#8E44AD" font-size="11" font-weight="bold">浏览器操作</text>

  <!-- === 左下角：日志文件 === -->
  <rect x="350" y="240" width="200" height="90" rx="10" fill="#FEF9E7" stroke="#F39C12" stroke-width="2" filter="url(#shadow)"/>
  <rect x="350" y="240" width="200" height="30" rx="10" fill="#F39C12"/>
  <rect x="350" y="260" width="200" height="10" fill="#F39C12"/>
  <text x="450" y="260" text-anchor="middle" fill="white" font-size="13" font-weight="bold">params_changes.log</text>
  <text x="450" y="295" text-anchor="middle" fill="#333" font-size="11">参数变更日志（JSON Lines）</text>
  <text x="450" y="315" text-anchor="middle" fill="#888" font-size="10">记录时间戳 + 参数快照</text>

  <!-- 垂直箭头：routing_params -> 日志文件（记录变更） -->
  <line x1="450" y1="170" x2="450" y2="240" stroke="#F39C12" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="465" y="208" fill="#F39C12" font-size="11" font-weight="bold">记录变更</text>

  <!-- 底部说明 -->
  <text x="450" y="505" text-anchor="middle" fill="#999" font-size="11">参数从右下角（实验人员）经 dashboard → app.py 流入 routing_params，再生效到 whoengine</text>
</svg>
