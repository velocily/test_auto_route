<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Microsoft YaHei, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <linearGradient id="paramGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="600" fill="url(#bgGrad2)"/>

  <text x="500" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">集中式参数管理架构</text>
  <text x="500" y="62" text-anchor="middle" font-size="12" fill="#7f8c8d">routing_params.py 作为单一数据源，所有模块共享</text>

  <!-- 中心：routing_params.py -->
  <rect x="350" y="240" width="300" height="120" rx="15" fill="url(#paramGrad)" filter="url(#shadow2)"/>
  <text x="500" y="275" text-anchor="middle" fill="white" font-size="18" font-weight="bold">routing_params.py</text>
  <text x="500" y="298" text-anchor="middle" fill="white" font-size="12">集中式参数存储（线程安全）</text>
  <text x="500" y="318" text-anchor="middle" fill="white" font-size="11">• 35 个参数定义 (PARAM_META)</text>
  <text x="500" y="335" text-anchor="middle" fill="white" font-size="11">• 3 套预设 (PRESETS)</text>
  <text x="500" y="352" text-anchor="middle" fill="white" font-size="11">• 范围校验 + 类型转换</text>

  <!-- 左上：whoengine.py -->
  <rect x="50" y="100" width="220" height="90" rx="10" fill="url(#engineGrad)" filter="url(#shadow2)"/>
  <text x="160" y="130" text-anchor="middle" fill="white" font-size="15" font-weight="bold">whoengine.py</text>
  <text x="160" y="152" text-anchor="middle" fill="white" font-size="11">路由引擎核心</text>
  <text x="160" y="170" text-anchor="middle" fill="white" font-size="10">读取参数用于：</text>
  <text x="160" y="184" text-anchor="middle" fill="white" font-size="10">α 计算、效率归一化、KNN</text>

  <!-- 右上：app.py (FastAPI) -->
  <rect x="730" y="100" width="220" height="90" rx="10" fill="url(#apiGrad)" filter="url(#shadow2)"/>
  <text x="840" y="130" text-anchor="middle" fill="white" font-size="15" font-weight="bold">app.py (FastAPI)</text>
  <text x="840" y="152" text-anchor="middle" fill="white" font-size="11">REST API 服务</text>
  <text x="840" y="170" text-anchor="middle" fill="white" font-size="10">提供参数读写接口：</text>
  <text x="840" y="184" text-anchor="middle" fill="white" font-size="10">/api/params, /api/params/preset</text>

  <!-- 左下：dashboard.html -->
  <rect x="50" y="410" width="220" height="90" rx="10" fill="url(#uiGrad)" filter="url(#shadow2)"/>
  <text x="160" y="440" text-anchor="middle" fill="white" font-size="15" font-weight="bold">dashboard.html</text>
  <text x="160" y="462" text-anchor="middle" fill="white" font-size="11">可视化调参台</text>
  <text x="160" y="480" text-anchor="middle" fill="white" font-size="10">滑块交互、预设切换</text>
  <text x="160" y="494" text-anchor="middle" fill="white" font-size="10">文档查看、实时反馈</text>

  <!-- 右下：实验人员 -->
  <rect x="730" y="410" width="220" height="90" rx="10" fill="#34495e" filter="url(#shadow2)"/>
  <text x="840" y="440" text-anchor="middle" fill="white" font-size="15" font-weight="bold">实验人员</text>
  <text x="840" y="462" text-anchor="middle" fill="white" font-size="11">通过浏览器调参</text>
  <text x="840" y="480" text-anchor="middle" fill="white" font-size="10">无需改代码、无需重启</text>
  <text x="840" y="494" text-anchor="middle" fill="white" font-size="10">即时生效</text>

  <!-- 连接线 -->
  <!-- whoengine → routing_params (读取) -->
  <line x1="270" y1="160" x2="350" y2="270" stroke="#555" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="290" y="220" fill="#555" font-size="10">读取参数</text>

  <!-- app.py → routing_params (读写) -->
  <line x1="730" y1="160" x2="650" y2="270" stroke="#555" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="680" y="220" fill="#555" font-size="10">读写参数</text>

  <!-- dashboard → app.py (HTTP) -->
  <line x1="270" y1="455" x2="730" y2="160" stroke="#555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow2)"/>
  <text x="500" y="300" fill="#555" font-size="10">HTTP 请求</text>

  <!-- 实验人员 → dashboard -->
  <line x1="730" y1="455" x2="270" y2="455" stroke="#555" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="500" y="445" text-anchor="middle" fill="#555" font-size="10">浏览器操作</text>

  <!-- routing_params → whoengine (参数生效) -->
  <line x1="400" y1="240" x2="200" y2="190" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow2)" opacity="0.5"/>
  <text x="280" y="225" fill="#27ae60" font-size="10">参数生效</text>

  <!-- 图例 -->
  <rect x="50" y="540" width="900" height="45" rx="5" fill="white" stroke="#ddd"/>
  <text x="70" y="560" fill="#555" font-size="11" font-weight="bold">图例：</text>
  <line x1="120" y1="557" x2="155" y2="557" stroke="#555" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="165" y="560" fill="#555" font-size="10">数据流向</text>
  <line x1="240" y1="557" x2="275" y2="557" stroke="#555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow2)"/>
  <text x="285" y="560" fill="#555" font-size="10">HTTP 请求</text>
  <line x1="360" y1="557" x2="395" y2="557" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow2)" opacity="0.5"/>
  <text x="405" y="560" fill="#555" font-size="10">参数生效（即时）</text>
  <text x="70" y="578" fill="#95a5a6" font-size="10">所有模块通过 routing_params 模块共享同一份参数，修改即时反映到路由决策中</text>
</svg>
